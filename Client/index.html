<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Calculation Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">JavaScript Web App</p>
      <h1>Progress Calculation Table</h1>
      <p class="subtitle">
        The first column is driven by the spreadsheet structure, and each
        review column is loaded from the database.
      </p>
    </section>

    <section class="card">
      <div class="card-header">
        <div>
          <p class="section-label">Component</p>
          <h2>Progress Matrix</h2>
        </div>
        <span class="sheet-badge">Sheet: Progress_Statistics_EDIT</span>
      </div>

      <div class="table-wrap">
        <table class="calc-table">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
